name: Initialise Wiki

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - '.github/workflows/init-wiki.yml'

permissions:
  contents: write

jobs:
  init-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Push wiki Home page
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          WIKI_DIR="$(mktemp -d)"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git" "$WIKI_DIR" 2>/dev/null || true
          cd "$WIKI_DIR"
          [ -d .git ] || { git init -b master; git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git"; }
          cat > Home.md << 'WIKIEOF'
# Billing — Wiki Home

**Billing** is the dedicated token accounting and payment service for the NeuralMimicry platform. It owns account balances, ledger reads, payment capture, token grants/debits/cashouts, and the internal account APIs used by Refiner.

